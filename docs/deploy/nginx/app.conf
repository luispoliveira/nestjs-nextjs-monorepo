# Nginx — template agnóstico de reverse proxy para este monorepo.
#
# Substituir antes de instalar:
#   <dominio>   → o domínio real (ex: app.exemplo.com)
#
# Topologia por omissão (web na raiz do domínio):
#   /          → web  (Next.js, standalone)         porta 8080
#   /api/auth  → auth (NestJS, better-auth)          porta 3000
#   /api       → api  (NestJS, REST + tRPC gateway)  porta 3100
#
# notifications, worker e cron não são expostos via Nginx — comunicam
# internamente via Redis/BullMQ e só expõem health/metrics em localhost.
#
# ── Deploy num subpath (ex: /admin) ───────────────────────────────────────────
# Se o domínio raiz já serve outra app e o `web` deste monorepo tem de viver
# sob um path (ex: /admin):
#   1. Definir NEXT_PUBLIC_BASE_PATH=/admin no .env.production (ver ../.env.example)
#   2. Substituir o bloco "location /" abaixo por:
#
#        location = /admin {
#            return 301 /admin/;
#        }
#        location /admin/ {
#            proxy_pass http://127.0.0.1:8080;
#        }
#
#      O redirect explícito de "/admin" (sem barra) é necessário: sem ele, um
#      pedido a /admin cai no fallback de "/" em vez do proxy — e como o Next
#      (trailingSlash: false por omissão) devolve 308 de /admin/ para /admin,
#      a ausência deste bloco cria um loop de redirects infinito entre o
#      Nginx e a app.
#
# Instalação:
#   sudo cp docs/deploy/nginx/app.conf /etc/nginx/sites-available/app
#   sudo nano /etc/nginx/sites-available/app   # substituir <dominio>
#   sudo ln -s /etc/nginx/sites-available/app /etc/nginx/sites-enabled/app
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d <dominio>

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name <dominio>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name <dominio>;

    ssl_certificate     /etc/letsencrypt/live/<dominio>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<dominio>/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Mais específico que /api/ — tem de vir antes para o prefixo mais longo casar primeiro.
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3000;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3100;
    }

    # Next.js — frontend e _next/static (ver bloco de subpath acima se aplicável)
    location / {
        proxy_pass http://127.0.0.1:8080;
    }

    access_log /var/log/nginx/app-access.log;
    error_log  /var/log/nginx/app-error.log warn;
}
