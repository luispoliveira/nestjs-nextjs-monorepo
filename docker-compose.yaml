networks:
  app:
    driver: bridge
  edge:
    driver: bridge
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ./docker/postgres.env
    ports:
      - '5432:5432'
    volumes:
      - ./.tmp/postgres-data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nestjs']
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - app
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - '27017:27017'
    env_file:
      - ./docker/mongo.env
    volumes:
      - ./.tmp/mongo-data:/data/db
    networks:
      - app
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --eval ''db.runCommand("ping")'' --quiet']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
