networks:
  app:
    driver: bridge
  edge:
    driver: bridge
services:
  traefik:
    container_name: traefik
    image: traefik:v3.6.2
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Uncomment for production with Let's Encrypt
      # - --certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}
      # - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      # - --certificatesresolvers.le.acme.tlschallenge=true
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./.tmp/traefik/letsencrypt:/letsencrypt
    networks:
      - edge
      - app
    restart: unless-stopped
  auth:
    build:
      context: .
      dockerfile: ./apps/auth-api/Dockerfile
      target: development
    command: turbo dev --filter=auth-api
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1
    ports:
      - '3000:3000'
    volumes:
      - ./apps/auth-api/src:/usr/src/app/apps/auth-api/src
    env_file:
      - ./apps/auth-api/.env.development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO /dev/null http://localhost:3000/api/auth/ok || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.auth.rule=PathPrefix(`/api/auth`)'
      - 'traefik.http.routers.auth.entrypoints=web'
      - 'traefik.http.services.auth.loadbalancer.server.port=3000'

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ./docker/postgres.env
    ports:
      - '5432:5432'
    volumes:
      - ./.tmp/postgres-data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nestjs']
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - app
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - '27017:27017'
    env_file:
      - ./docker/mongo.env
    volumes:
      - ./.tmp/mongo-data:/data/db
    networks:
      - app
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --eval ''db.runCommand("ping")'' --quiet']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
