services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ./docker/postgres.env
    ports:
      - '5432:5432'
    volumes:
      - ./.tmp/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nestjs']
      interval: 10s
      timeout: 5s
      retries: 5
