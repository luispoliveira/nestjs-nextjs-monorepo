schema: spec-driven

context: |
  ## Domain
  Generic SaaS admin dashboard / starter template built as a Turborepo + pnpm monorepo.

  ## Workspace Structure
  apps/
    auth/          # NestJS 11 — authentication + session management (better-auth)
    notifications/ # NestJS 11 — notification delivery (email via Redis events)
    worker/        # NestJS 11 — Bull v4 worker processing email jobs from queue
    web/           # Next.js 16 — frontend admin dashboard (App Router)
  packages/
    database/      # Prisma 7 client (PrismaPg adapter), DatabaseModule, DatabaseService, seeders
    shared/        # Global NestJS infrastructure: constants, abstracts, guards, interceptors,
                   # filters, publishers, queue, modules, utils, types, mongo, trpc, health
    shared-types/  # Zod v4 schemas shared between frontend and backend (RoleEnum, paginationSchema, etc.)
    trpc/          # AppRouter type (auto-generated by nestjs-trpc-v2 from auth app)
    mail/          # MailModule with Brevo provider
    eslint-config/ # Shared ESLint configs
    typescript-config/ # Shared tsconfig bases

  ## Tech Stack
  - Monorepo: Turborepo + pnpm workspaces (always use pnpm — never npm or yarn)
  - Backend: NestJS 11 (TypeScript), microservices via Redis transport
  - Frontend: Next.js 16 (TypeScript), Tailwind CSS v4, shadcn/ui (Radix UI primitives)
  - Database: PostgreSQL via Prisma 7 + PrismaPg adapter (primary); MongoDB via Mongoose (logs/audit only); Redis (cache/queues)
  - Auth: better-auth + @thallesp/nestjs-better-auth — NEVER use Passport or JWT
  - Validation: Zod v4 + nestjs-zod (createZodDto, ZodValidationPipe, ZodSerializerInterceptor — registered globally)
  - API contract: tRPC via nestjs-trpc-v2 for type-safe frontend↔backend communication
  - Queue: @nestjs/bull (Bull v4) with Redis — NOT BullMQ
  - Logging: nestjs-pino with correlation IDs via nestjs-cls
  - Health: @nestjs/terminus (HealthController registered globally by SharedModule)
  - Notifications: sonner in frontend; email delivery via Bull queue → worker → mail package
  - Themes: next-themes (light/dark) in frontend
  - Forms: React Hook Form + Zod resolvers in frontend

  ## Key Conventions
  - Internal packages use the @repo/ prefix: @repo/database, @repo/shared, @repo/mail, @repo/shared-types, @repo/trpc
  - Every NestJS app module must import SharedModule.register() first
  - Never hardcode string tokens, queue names, or patterns — always import from @repo/shared constants:
      SERVICES, QUEUES, EVENT_PATTERNS, MESSAGE_PATTERNS, JOB_PATTERNS, CLS_CORRELATION_ID
  - Zod v4 API: z.email() (not z.string().email()), .meta({ id: 'SchemaName' }) for OpenAPI schema IDs
  - Model conventions: String @id @default(cuid()), createdAt/updatedAt/deletedAt on every model,
      @@map("snake_case"), @@index on all foreign keys
  - Do not modify auth.prisma — owned by better-auth
  - Default to server components in Next.js; add 'use client' only when hooks or browser APIs are needed
  - Auth client: authClient from @/lib/auth/client; server: getServerSession() — never implement custom JWT
  - Use RoleEnum from @repo/shared-types for role checks
  - Use conventional commits: feat:, fix:, chore:, refactor:, test:, docs:
  - Run tasks via Turborepo: pnpm build / pnpm dev / pnpm lint / pnpm test
  - Database commands: pnpm db:generate / pnpm db:migrate / pnpm db:seed

rules:
  proposal:
    - Include a "Non-goals" section to define explicit scope boundaries
    - Include a "Risks & Mitigations" section for non-trivial changes
    - Include an "Alternatives considered" section when multiple approaches exist
    - Keep the proposal focused on the why and what, not the how (that belongs in design.md)
    - Reference the affected apps or packages (e.g., apps/auth, packages/database)

  design:
    - Specify which app(s) and package(s) are involved in every design decision
    - Include data model changes (Prisma schema additions) when relevant
    - Document new event/message patterns, queue jobs, or tRPC procedures introduced
    - Describe the auth/authorization impact (roles, guards) if applicable

  tasks:
    - Each task should be scoped to ~1–2 hours of work (one feature slice)
    - Prefix each task description with the target path (e.g., "apps/auth: ..." or "packages/database: ...")
    - Always include explicit test-writing tasks (unit and/or integration) after each feature task
    - Use conventional commit format in task titles (feat:, fix:, chore:, refactor:, test:)
    - Order tasks so dependencies come first (migrations before services, services before controllers)
    - Include a final task for end-to-end smoke testing or integration verification
